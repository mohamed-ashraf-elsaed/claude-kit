name: Feature request
description: Suggest an idea or improvement for claude-kit
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what is missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like claude-kit to do? Be as concrete as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Install command / prompts
        - label: Quality gate (Pint / PHPStan / Pest)
        - label: Frontend tooling (ESLint / Prettier / types)
        - label: Skills or CLAUDE.md content
        - label: CI / release automation
