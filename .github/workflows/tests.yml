name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        dependencies: [lowest, stable]

    name: PHP ${{ matrix.php }} - ${{ matrix.dependencies }} deps

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: pcov

      - name: Install dependencies
        run: |
          if [ "${{ matrix.dependencies }}" = "lowest" ]; then
            composer update --prefer-lowest --prefer-dist --no-interaction --no-progress
          else
            composer update --prefer-stable --prefer-dist --no-interaction --no-progress
          fi

      - name: Run test suite (with coverage gate)
        run: vendor/bin/pest --coverage --min=80 --compact
